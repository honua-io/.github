# Reusable CodeQL (SAST) workflow for honua-io repos.
# Caller example:
#   jobs:
#     codeql:
#       uses: honua-io/.github/.github/workflows/reusable-codeql.yml@main
#       with:
#         languages: '["csharp","javascript-typescript"]'
name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages, e.g. ["csharp","javascript-typescript","python"]'
        type: string
        required: true
      build-mode:
        description: 'CodeQL build mode (none | autobuild | manual). Compiled langs use autobuild by default.'
        type: string
        required: false
        default: 'none'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Interpreted languages use build-mode 'none'; compiled languages (csharp)
          # fall back to autobuild unless the caller overrides.
          build-mode: ${{ (matrix.language == 'csharp' && inputs.build-mode == 'none') && 'autobuild' || inputs.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
