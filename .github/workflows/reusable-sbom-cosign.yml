# Reusable supply-chain workflow: generate a CycloneDX SBOM and (optionally) sign a
# released container image with cosign (keyless / Sigstore) + attach a SBOM attestation.
#
# Run on release. Caller example:
#   on: { release: { types: [published] } }
#   jobs:
#     supply-chain:
#       uses: honua-io/.github/.github/workflows/reusable-sbom-cosign.yml@main
#       with:
#         image-ref: ghcr.io/honua-io/honua-server:${{ github.ref_name }}
name: Reusable SBOM + Cosign

on:
  workflow_call:
    inputs:
      sbom-path:
        description: 'Directory to generate a source SBOM from'
        type: string
        required: false
        default: '.'
      image-ref:
        description: 'Released image to sign + attest (empty = SBOM only, no signing)'
        type: string
        required: false
        default: ''

permissions:
  contents: write   # attach SBOM to the release
  packages: write   # push cosign signature/attestation to the registry
  id-token: write   # cosign keyless (OIDC)

jobs:
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.sbom-path }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cyclonedx.json

  sign:
    name: Sign + attest image
    needs: sbom
    if: inputs.image-ref != ''
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless)
        run: cosign sign --yes "${{ inputs.image-ref }}"

      - name: Generate + attest SBOM for image
        run: |
          cosign download sbom "${{ inputs.image-ref }}" > /dev/null 2>&1 || true
          syft "${{ inputs.image-ref }}" -o cyclonedx-json=image.sbom.json
          cosign attest --yes --type cyclonedx --predicate image.sbom.json "${{ inputs.image-ref }}"
