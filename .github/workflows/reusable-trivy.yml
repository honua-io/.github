# Reusable Trivy scan (filesystem vulns + secrets, and optionally a container image).
# Results upload to the repo's Security → Code scanning tab as SARIF.
name: Reusable Trivy

on:
  workflow_call:
    inputs:
      scan-type:
        description: 'fs (filesystem) or image'
        type: string
        required: false
        default: 'fs'
      image-ref:
        description: 'Image reference to scan when scan-type=image (e.g. ghcr.io/org/app:tag)'
        type: string
        required: false
        default: ''
      severity:
        description: 'Comma-separated severities to report'
        type: string
        required: false
        default: 'CRITICAL,HIGH'

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy ${{ inputs.scan-type }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: ${{ inputs.scan-type }}
          scan-ref: ${{ inputs.scan-type == 'fs' && '.' || '' }}
          image-ref: ${{ inputs.scan-type == 'image' && inputs.image-ref || '' }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
        env:
          # Avoid rate limits / stale DB failures breaking CI.
          TRIVY_SKIP_DB_UPDATE: 'false'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ inputs.scan-type }}'
